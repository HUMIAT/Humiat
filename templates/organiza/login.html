{% extends "organiza/base.html" %}
{% block conteudo %}
<section class="cartao login-cartao">
    <p class="tag">Área Restrita</p>
    <h1>Entrar no Organiza</h1>
    <p class="texto-suave">Acesso interno para Junior, Debora e Luiz.</p>

    {% if erro %}
    <div class="alerta">{{ erro }}</div>
    {% endif %}

    <form method="post" class="formulario">
        <label>Usuário
            <input name="usuario" placeholder="Junior" required />
        </label>
        <label>Senha
            <input name="senha" type="password" required />
        </label>
        <button class="botao primario" type="submit">Entrar</button>
    </form>
</section>
{% endblock %}
