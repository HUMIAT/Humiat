{% extends "organiza/base.html" %}
{% block conteudo_publico %}
<section class="login-clean">
  <div class="login-brand"><span>H</span><div><strong>HUMIAT</strong><small>Clientes e equipamentos</small></div></div>
  <form method="post" class="cartao login-card">
    <p class="tag">Área restrita</p><h1>Entrar</h1>
    {% if erro %}<div class="alerta erro">{{ erro }}</div>{% endif %}
    <label>Usuário<input name="usuario" autocomplete="username" required autofocus></label>
    <label>Senha<input type="password" name="senha" autocomplete="current-password" required></label>
    <button class="botao primario botao-cheio" type="submit">Entrar</button>
  </form>
</section>
{% endblock %}
