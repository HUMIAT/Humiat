{% extends "organiza/base.html" %}
{% block conteudo %}
<section class="pagina-clean"><div class="titulo-linha"><div><p class="tag">Equipamento</p><h1>{{ 'Editar equipamento' if equipamento and equipamento.id else 'Novo equipamento' }}</h1><p class="texto-suave">Cliente: <strong>{{ cliente.nome }}</strong></p></div><a class="botao" href="/organiza/clientes/{{ cliente.id }}">Voltar</a></div><section class="cartao formulario-cartao">{% if erro %}<div class="alerta erro">{{ erro }}</div>{% endif %}<form method="post" class="formulario formulario-grade clean-form">
<label>Tipo *<input name="tipo" required placeholder="Jukebox, computador, caixa de som..." value="{{ equipamento.tipo if equipamento and equipamento.tipo else '' }}"></label><label>Modelo<input name="modelo" value="{{ equipamento.modelo if equipamento and equipamento.modelo else '' }}"></label><label>Máquina / código<input name="maquina" value="{{ equipamento.maquina if equipamento and equipamento.maquina else '' }}"></label><label>Status<select name="status">{% for s in ['Ativo','Em manutenção','Vendido','Entregue','Inativo'] %}<option {% if equipamento and equipamento.status == s %}selected{% endif %}>{{ s }}</option>{% endfor %}</select></label><label>Pacote<input name="pacote" value="{{ equipamento.pacote if equipamento and equipamento.pacote else '' }}"></label><label>Falta pacote<input name="falta_pacote" inputmode="numeric" value="{{ equipamento.falta_pacote if equipamento and equipamento.falta_pacote is not none else '' }}"></label><label>Plano<input name="plano" value="{{ equipamento.plano if equipamento and equipamento.plano else '' }}"></label><label>Rede instalada<input name="rede_instalada" value="{{ equipamento.rede_instalada if equipamento and equipamento.rede_instalada else '' }}"></label><label>AnyDesk<input name="anydesk" value="{{ equipamento.anydesk if equipamento and equipamento.anydesk else '' }}"></label><label>Data da compra<input type="date" name="data_compra" value="{{ equipamento.data_compra if equipamento and equipamento.data_compra else '' }}"></label><label>Previsão de entrega<input type="date" name="previsao_entrega" value="{{ equipamento.previsao_entrega if equipamento and equipamento.previsao_entrega else '' }}"></label><label>Preço de custo<input name="preco_custo" inputmode="decimal" value="{{ equipamento.preco_custo if equipamento and equipamento.preco_custo else '' }}"></label><label>Preço de venda<input name="preco_venda" inputmode="decimal" value="{{ equipamento.preco_venda if equipamento and equipamento.preco_venda else '' }}"></label><label>Valor total<input name="valor" inputmode="decimal" value="{{ equipamento.valor if equipamento and equipamento.valor else '' }}"></label><label>Valor recebido<input name="pago" inputmode="decimal" value="{{ equipamento.pago if equipamento and equipamento.pago else '' }}"></label><label>Valor restante<input name="falta" inputmode="decimal" value="{{ equipamento.falta if equipamento and equipamento.falta else '' }}"></label><label class="campo-largo">Observações<textarea name="observacao">{{ equipamento.observacao if equipamento and equipamento.observacao else '' }}</textarea></label><button class="botao primario botao-cheio campo-largo" type="submit">Salvar equipamento</button></form></section></section>
{% endblock %}
