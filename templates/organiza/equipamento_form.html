{% extends "organiza/base.html" %}
{% block conteudo %}
<section class="cartao formulario-cartao">
    <div class="titulo-linha">
        <div>
            <p class="tag">Equipamento</p>
            <h1>Novo equipamento</h1>
            <p class="texto-suave">Cliente: <strong>{{ cliente.nome }}</strong></p>
        </div>
        <a class="botao" href="/organiza/clientes/{{ cliente.id }}">Voltar</a>
    </div>

    <form method="post" class="formulario formulario-grade">
        <label>Tipo
            <input name="tipo" placeholder="Jukebox, Fliperama, Sistema, Totem">
        </label>
        <label>Modelo
            <input name="modelo" placeholder="Modelo do equipamento">
        </label>
        <label>Pacote
            <input name="pacote" placeholder="Ex.: 2025.3">
        </label>
        <label>Falta pacote
            <input name="falta_pacote" inputmode="numeric">
        </label>
        <label>Plano
            <input name="plano" placeholder="Ex.: Básico">
        </label>
        <label>Status
            <select name="status">
                <option>Ativo</option>
                <option>Vencendo</option>
                <option>Vencido</option>
                <option>Entregue</option>
                <option>Cancelado</option>
            </select>
        </label>
        <label>Valor
            <input name="valor" placeholder="2530">
        </label>
        <label>Pago
            <input name="pago" placeholder="2530">
        </label>
        <label>Falta
            <input name="falta" placeholder="0">
        </label>
        <label>Data da compra
            <input type="date" name="data_compra">
        </label>
        <label>Previsão de entrega
            <input type="date" name="previsao_entrega">
        </label>
        <label>Máquina
            <input name="maquina">
        </label>
        <label>Rede instalada
            <input name="rede_instalada">
        </label>
        <label>AnyDesk
            <input name="anydesk">
        </label>
        <label class="campo-largo">Observação
            <textarea name="observacao"></textarea>
        </label>
        <button class="botao primario botao-cheio campo-largo" type="submit">Salvar equipamento</button>
    </form>
</section>
{% endblock %}
