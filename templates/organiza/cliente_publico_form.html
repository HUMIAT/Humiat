<!doctype html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Minha ficha</title>
    <link rel="stylesheet" href="/static/css/organiza.css">
</head>
<body class="organiza-body publico-body">
<main class="publico-container">
    <section class="cartao formulario-cartao publico-card">
        <p class="tag">Minha ficha</p>
        <h1>Atualizar cadastro</h1>
        <p class="texto-suave">Confira e atualize seus dados abaixo.</p>
        {% if salvo %}<div class="alerta sucesso">Ficha atualizada com sucesso.</div>{% endif %}
        <form method="post" action="/ficha-cliente/{{ token }}/salvar" class="formulario formulario-grade">
            <input type="hidden" name="telefone_confirmado" value="{{ telefone_confirmado }}">
            <label>Nome
                <input name="nome" required value="{{ cliente.nome or '' }}">
            </label>
            <label>Empresa
                <input name="empresa" value="{{ cliente.empresa or '' }}">
            </label>
            <label>CPF/CNPJ
                <input name="documento" value="{{ cliente.documento or '' }}">
            </label>
            <label>CEP
                <input name="cep" inputmode="numeric" value="{{ cliente.cep or '' }}">
            </label>
            <label>Cidade
                <input name="cidade" value="{{ cliente.cidade or '' }}">
            </label>
            <label>Bairro
                <input name="bairro" value="{{ cliente.bairro or '' }}">
            </label>
            <label class="campo-largo">Endereço
                <input name="endereco" value="{{ cliente.endereco or '' }}">
            </label>
            <label class="campo-largo">E-mail
                <input type="email" name="email" value="{{ cliente.email or '' }}">
            </label>
            <label class="campo-largo">Observação
                <textarea name="observacao">{{ cliente.observacao or '' }}</textarea>
            </label>
            <button class="botao primario botao-cheio campo-largo" type="submit">Salvar minha ficha</button>
        </form>
    </section>
</main>
</body>
</html>
