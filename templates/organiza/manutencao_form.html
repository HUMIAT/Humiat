{% extends "organiza/base.html" %}{% block conteudo %}<section class="pagina-clean"><div class="titulo-linha"><div><p class="tag">Nova</p><h1>Manutenção</h1><p class="texto-suave">Toda manutenção precisa de cliente e equipamento.</p></div><a class="botao" href="/organiza/manutencoes">Voltar</a></div><form class="cartao formulario" method="post"><label>Cliente<select name="cliente_id" id="cliente" required><option value="">Selecione</option>{% for c in clientes %}<option value="{{ c.id }}" {% if c.id == cliente_id %}selected{% endif %}>{{ c.nome }} · {{ c.telefone|telefone }}</option>{% endfor %}</select></label><label>Equipamento<select name="equipamento_id" id="equipamento" required><option value="">Selecione o cliente</option>{% for c in clientes %}{% for e in c.equipamentos %}<option data-cliente="{{ c.id }}" value="{{ e.id }}" {% if e.id == equipamento_id %}selected{% endif %}>{{ e.tipo }}{% if e.modelo %} · {{ e.modelo }}{% endif %}</option>{% endfor %}{% endfor %}</select></label><label>Defeito informado<textarea name="defeito" required></textarea></label><label>Observação interna<textarea name="observacao"></textarea></label><button class="botao primario">Criar manutenção e orçamento</button></form></section><script>const c=document.querySelector('#cliente'),e=document.querySelector('#equipamento');function filtrar(){[...e.options].forEach((o,i)=>{if(i)o.hidden=o.dataset.cliente!==c.value});if(e.selectedOptions[0]?.hidden)e.value=''}c.addEventListener('change',filtrar);filtrar();</script>{% endblock %}
